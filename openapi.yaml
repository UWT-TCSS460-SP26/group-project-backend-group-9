openapi: 3.0.3
info:
    title: TCSS 460 Group Project API
    description: |
        **Team:** Team 9
        **Deployed URL:** https://tcss460-team-9-api-72a4ffcce368.herokuapp.com

        A RESTful API for the TCSS 460 group project.
    version: 0.2.0

servers:
    - url: https://tcss460-team-9-api-72a4ffcce368.herokuapp.com
      description: Production API
    - url: http://localhost:3000
      description: Local development

tags:
    - name: General
      description: General-purpose routes
    - name: Movies
      description: Movie endpoints
    - name: Shows
      description: TV show endpoints

paths:
    /status:
        get:
            tags: [General]
            summary: Status
            description: Get the status of the server.
            responses:
                '200':
                    description: Server is alive.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    status:
                                        type: string
                                        example: 'Alive'
    /movies/{id}:
        get:
            tags: [Movies]
            summary: Get movie details
            description: Returns detailed information for a single movie by its TMDB ID.
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: integer
                      example: 961323
                  description: TMDB movie ID
            responses:
                '200':
                    description: Movie details.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MovieResponse'
                '404':
                    description: Movie not found
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Movie not found
                '500':
                    description: Server error
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Internal server error
                '502':
                    description: Bad gateway
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Failed to fetch movie details
    /movies/search:
        get:
            tags: [Movies]
            summary: Search for movies with query strings
            description: Returns movies matching search query. With no parameters, returns movies sorted by popularity in descending order.
            parameters:
                - name: page
                  in: query
                  required: false
                  schema:
                      type: integer
                      default: 0
                      minimum: 0
                  description: Page number from the results
                - name: lang
                  in: query
                  required: false
                  schema:
                      type: string
                      example: en
                      default: en
                  description: ISO-639 language code
                - name: title
                  in: query
                  required: false
                  schema:
                      type: string
                      example: Nimona
                  description: Search for (case-insensitive) words within the title.
                - name: description
                  in: query
                  required: false
                  explode: false
                  schema:
                      type: array
                      example: [knight, crime]
                  description: Filter results for (case-insensitive) words within the description. Comma separated list
                - name: after
                  in: query
                  required: false
                  schema:
                      type: string
                      example: 2022-05-17
                  description: Filter earliest release date allowed among search results (inclusive)
                - name: before
                  in: query
                  required: false
                  schema:
                      type: string
                      example: 2026-03-22
                  description: Filter latest release date allowed among search results (inclusive)
                - name: sort
                  in: query
                  required: false
                  schema:
                      type: string
                      default: popularity
                      enum: [title, popularity, date, rating]
                  description: Field to sort on. If title parameter is included, uses the default value.
                - name: order
                  in: query
                  required: false
                  schema:
                      type: string
                      default: desc
                      enum: [asc, desc]
                  description: Sorting order. If title parameter is included, uses the default value.
            responses:
                '200':
                    description: One page of returned movies, with 0 - 20 movies per page.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MoviesSearchResponse'
                '400':
                    description: Bad query string
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Page number must be less than total pages
                '500':
                    description: Server error
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Internal server error
                '502':
                    description: Bad gateway
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Network error
    /shows/{id}:
        get:
            tags: [Shows]
            summary: Get TV show details
            description: Returns detailed metadata for a specific TV show.
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: integer
                  description: TMDB series ID
            responses:
                '200':
                    description: TV show details
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ShowResponse'
                '400':
                    description: Invalid show ID
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Invalid show ID
                '404':
                    description: Show not found
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Show not found
                '500':
                    description: Server error
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Failed to fetch show data
                '502':
                    description: Bad gateway
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Network error
    /shows/search:
        get:
            tags: [Shows]
            summary: Search for shows with query strings
            description: Returns shows matching search query. With no parameters, returns shows sorted by popularity in descending order.
            parameters:
                - name: page
                  in: query
                  required: false
                  schema:
                      type: integer
                      default: 0
                      minimum: 0
                  description: Page number from the results
                - name: lang
                  in: query
                  required: false
                  schema:
                      type: string
                      example: en
                      default: en
                  description: ISO-639 language code
                - name: name
                  in: query
                  required: false
                  schema:
                      type: string
                      example: Breaking Bad
                  description: Search for (case-insensitive) words within the name.
                - name: description
                  in: query
                  required: false
                  explode: false
                  schema:
                      type: array
                      example: [teacher, chemistry]
                  description: Filter results for (case-insensitive) words within the description. Comma separated list
                - name: after
                  in: query
                  required: false
                  schema:
                      type: string
                      example: 2007-01-13
                  description: Filter earliest first air date allowed among search results (inclusive)
                - name: before
                  in: query
                  required: false
                  schema:
                      type: string
                      example: 2010-03-14
                  description: Filter latest first air date allowed among search results (inclusive)
                - name: sort
                  in: query
                  required: false
                  schema:
                      type: string
                      default: popularity
                      enum: [name, popularity, date, rating]
                  description: Field to sort on. If name parameter is included, uses the default value.
                - name: order
                  in: query
                  required: false
                  schema:
                      type: string
                      default: desc
                      enum: [asc, desc]
                  description: Sorting order. If name parameter is included, uses the default value.
            responses:
                '200':
                    description: One page of returned shows, with 0 - 20 shows per page.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ShowsSearchResponse'
                '400':
                    description: Bad query string
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Page number must be less than total pages
                '500':
                    description: Server error
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Internal server error
                '502':
                    description: Bad gateway
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Network error

# ── Schemas ───────────────────────────────────────────────────

components:
    schemas:
        MoviesSearchResponse:
            type: object
            properties:
                code:
                    type: integer
                    example: 200
                page:
                    type: integer
                    example: 0
                totalPages:
                    type: integer
                    example: 2
                    minimum: 0
                results:
                    type: array
                    items:
                        type: object
                        minItems: 0
                        maxItems: 20
                        properties:
                            id:
                                type: integer
                                example: 961323
                            lang:
                                type: string
                                example: en
                            title:
                                type: string
                                example: Nimona
                            description:
                                type: string
                                example: A knight framed for a tragic crime teams with a scrappy, shape-shifting teen to prove his innocence.
                            releaseDate:
                                type: string
                                example: 2023-06-23
                            poster:
                                type: string
                                example: https://image.tmdb.org/t/p/w500/2NQljeavtfl22207D1kxLpa4LS3.jpg

        MovieResponse:
            type: object
            properties:
                id:
                    type: integer
                    example: 961323
                title:
                    type: string
                    example: Nimona
                description:
                    type: string
                    example: A knight framed for a tragic crime teams with a scrappy, shape-shifting teen to prove his innocence.
                releaseDate:
                    type: string
                    example: 2023-06-23
                poster:
                    type: string
                    example: https://image.tmdb.org/t/p/w500/2NQljeavtfl22207D1kxLpa4LS3.jpg
                genres:
                    type: array
                    items:
                        type: string
                    example: [Animation, Family, Adventure]
                runtime:
                    type: integer
                    example: 99
                rating:
                    type: number
                    example: 7.9

        ShowsSearchResponse:
            type: object
            properties:
                code:
                    type: integer
                    example: 200
                page:
                    type: integer
                    example: 0
                totalPages:
                    type: integer
                    example: 1
                    minimum: 0
                results:
                    type: array
                    items:
                        type: object
                        minItems: 0
                        maxItems: 20
                        properties:
                            id:
                                type: integer
                                example: 1396
                            lang:
                                type: string
                                example: en
                            name:
                                type: string
                                example: Breaking Bad
                            description:
                                type: string
                                example: A chemistry teacher diagnosed with cancer turns to manufacturing drugs.
                            firstAirDate:
                                type: string
                                example: 2008-01-20
                            poster:
                                type: string
                                example: https://image.tmdb.org/t/p/w500/ztkUQFLlC19CCMYHW9o1zWhJRNq.jpg

        ShowResponse:
            type: object
            properties:
                code:
                    type: integer
                    example: 200
                id:
                    type: integer
                    example: 1396
                name:
                    type: string
                    example: Breaking Bad
                description:
                    type: string
                    example: A chemistry teacher diagnosed with cancer turns to manufacturing drugs.
                posterUrl:
                    type: string
                    nullable: true
                    example: https://image.tmdb.org/t/p/w500/ztkUQFLlC19CCMYHW9o1zWhJRNq.jpg
                firstAirDate:
                    type: string
                    example: 2008-01-20
                lastAirDate:
                    type: string
                    example: 2013-09-29
                numberOfSeasons:
                    type: integer
                    example: 5
                numberOfEpisodes:
                    type: integer
                    example: 62
                status:
                    type: string
                    example: Ended
                networks:
                    type: array
                    items:
                        type: string
                    example: [AMC]
                genres:
                    type: array
                    items:
                        type: string
                    example: [Drama, Crime]
