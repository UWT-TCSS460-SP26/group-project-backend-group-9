openapi: 3.0.3
info:
    title: TCSS 460 Group Project API
    description: |
        **Team:** Team 9
        **Deployed URL:** [Your deployed URL]

        A RESTful API for the TCSS 460 group project.
    version: 0.1.0

servers:
    - url: http://localhost:3000
      description: Local development

tags:
    - name: General
      description: General-purpose routes

paths:
    /status:
        get:
            tags: [General]
            summary: Status
            description: Get the status of the server.
            responses:
                '200':
                    description: Server is alive.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    status:
                                        type: string
                                        example: 'Alive'
