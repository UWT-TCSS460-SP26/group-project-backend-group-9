openapi: 3.0.3
info:
    title: TCSS 460 Group Project API
    description: |
        **Team:** Team 9
        **Deployed URL:** https://tcss460-team-9-api-72a4ffcce368.herokuapp.com

        A RESTful API for the TCSS 460 group project.
    version: 0.2.0

servers:
    - url: https://tcss460-team-9-api-72a4ffcce368.herokuapp.com
      description: Production API
    - url: http://localhost:3000
      description: Local development

tags:
    - name: General
      description: General-purpose routes
    - name: Movies
      description: Movie endpoints
    - name: Shows
      description: TV show endpoints
    - name: Reviews
      description: User-authored reviews of movies and shows
    - name: Users
      description: User endpoints
    - name: Issues
      description: Issue reporting endpoints

paths:
    /status:
        get:
            tags: [General]
            summary: Status
            description: Get the status of the server.
            responses:
                '200':
                    description: Server is alive.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    status:
                                        type: string
                                        example: 'Alive'
    /movies/{id}:
        get:
            tags: [Movies]
            summary: Get movie details
            description: Returns detailed information for a single movie by its TMDB ID.
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: integer
                      example: 961323
                  description: TMDB movie ID
            responses:
                '200':
                    description: Movie details.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MovieResponse'
                '400':
                    description: Invalid movie ID
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationErrorResponse'
                '404':
                    description: Movie not found
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Movie not found
                '500':
                    description: Server error
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Internal server error
                '502':
                    description: Bad gateway
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Failed to fetch movie details
    /movies/search:
        get:
            tags: [Movies]
            summary: Search for movies with query strings
            description: Returns movies matching search query. With no parameters, returns movies sorted by popularity in descending order.
            parameters:
                - name: page
                  in: query
                  required: false
                  schema:
                      type: integer
                      default: 1
                      minimum: 1
                  description: Page number from the results. Clamps to last page
                - name: lang
                  in: query
                  required: false
                  schema:
                      type: string
                      example: en
                      default: en
                  description: ISO-639 language code
                - name: title
                  in: query
                  required: false
                  schema:
                      type: string
                      example: Nimona
                  description: Search for (case-insensitive) words within the title.
                - name: description
                  in: query
                  required: false
                  explode: false
                  schema:
                      type: array
                      example: [knight, crime]
                  description: Filter results for (case-insensitive) words within the description. Comma separated list
                - name: after
                  in: query
                  required: false
                  schema:
                      type: string
                      example: 2022-05-17
                  description: Filter earliest release date allowed among search results (inclusive)
                - name: before
                  in: query
                  required: false
                  schema:
                      type: string
                      example: 2026-03-22
                  description: Filter latest release date allowed among search results (inclusive)
                - name: sort
                  in: query
                  required: false
                  schema:
                      type: string
                      default: popularity
                      enum: [title, popularity, date, rating]
                  description: Field to sort on. If title parameter is included, uses the default value
                - name: order
                  in: query
                  required: false
                  schema:
                      type: string
                      default: desc
                      enum: [asc, desc]
                  description: Sorting order
            responses:
                '200':
                    description: One page of returned movies, with 0 - 20 movies per page.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MoviesSearchResponse'
                '400':
                    description: Bad query string
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationErrorResponse'
                '500':
                    description: Server error
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Internal server error
                '502':
                    description: Bad gateway
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Network error
    /shows/{id}:
        get:
            tags: [Shows]
            summary: Get TV show details
            description: Returns detailed metadata for a specific TV show.
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: integer
                  description: TMDB series ID
            responses:
                '200':
                    description: TV show details
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ShowResponse'
                '400':
                    description: Invalid show ID
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationErrorResponse'
                '404':
                    description: Show not found
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Show not found
                '500':
                    description: Server error
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Network error
                '502':
                    description: Bad gateway
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Failed to fetch show data
    /shows/search:
        get:
            tags: [Shows]
            summary: Search for shows with query strings
            description: Returns shows matching search query. With no parameters, returns shows sorted by popularity in descending order.
            parameters:
                - name: page
                  in: query
                  required: false
                  schema:
                      type: integer
                      default: 1
                      minimum: 1
                  description: Page number from the results. Clamps to last page
                - name: lang
                  in: query
                  required: false
                  schema:
                      type: string
                      example: en
                      default: en
                  description: ISO-639 language code
                - name: name
                  in: query
                  required: false
                  schema:
                      type: string
                      example: Breaking Bad
                  description: Search for (case-insensitive) words within the name.
                - name: description
                  in: query
                  required: false
                  explode: false
                  schema:
                      type: array
                      example: [teacher, chemistry]
                  description: Filter results for (case-insensitive) words within the description. Comma separated list
                - name: after
                  in: query
                  required: false
                  schema:
                      type: string
                      example: 2007-01-13
                  description: Filter earliest first air date allowed among search results (inclusive)
                - name: before
                  in: query
                  required: false
                  schema:
                      type: string
                      example: 2010-03-14
                  description: Filter latest first air date allowed among search results (inclusive)
                - name: sort
                  in: query
                  required: false
                  schema:
                      type: string
                      default: popularity
                      enum: [name, popularity, date, rating]
                  description: Field to sort on. If name parameter is included, uses the default value.
                - name: order
                  in: query
                  required: false
                  schema:
                      type: string
                      default: desc
                      enum: [asc, desc]
                  description: Sorting order. If name parameter is included, uses the default value.
            responses:
                '200':
                    description: One page of returned shows, with 0 - 20 shows per page.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ShowsSearchResponse'
                '400':
                    description: Bad query string
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationErrorResponse'
                '500':
                    description: Server error
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Internal server error
                '502':
                    description: Bad gateway
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Network error
    /reviews:
        get:
            tags: [Reviews]
            summary: List reviews
            description: |
                Returns a paginated list of reviews, newest first. Optionally filter by
                `tmdbId` and `mediaType` to fetch all reviews for a specific title.
            parameters:
                - name: page
                  in: query
                  required: false
                  schema:
                      type: integer
                      default: 1
                      minimum: 1
                  description: 1-indexed page number
                - name: limit
                  in: query
                  required: false
                  schema:
                      type: integer
                      default: 20
                      minimum: 1
                      maximum: 100
                  description: Page size (capped at 100)
                - name: tmdbId
                  in: query
                  required: false
                  schema:
                      type: integer
                      example: 961323
                  description: Filter to reviews of a specific TMDB title
                - name: mediaType
                  in: query
                  required: false
                  schema:
                      type: string
                      default: MOVIE
                      enum: [MOVIE, TV]
                  description: Filter to reviews of a specific media type
            responses:
                '200':
                    description: Paginated list of reviews
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ReviewListResponse'
                '400':
                    description: Invalid query parameters
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationErrorResponse'
                '500':
                    description: Server error
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Internal server error
        post:
            tags: [Reviews]
            summary: Create a review
            description: |
                Creates a review authored by the authenticated user. Returns 409 if the
                user has already reviewed this `(tmdbId, mediaType)` pair — clients must
                use PUT to edit instead.
            security:
                - bearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CreateReviewRequest'
            responses:
                '201':
                    description: Review created
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Review'
                '400':
                    description: Invalid input
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationErrorResponse'
                '401':
                    description: Missing or invalid bearer token
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthenticatedErrorResponse'
                '409':
                    description: User has already reviewed this title
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ConflictErrorResponse'
                '500':
                    description: Server error
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Failed to create review
    /reviews/{id}:
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
              description: Review ID
        get:
            tags: [Reviews]
            summary: Get a review by ID
            responses:
                '200':
                    description: Review found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Review'
                '400':
                    description: Invalid review ID
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationErrorResponse'
                '404':
                    description: Review not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MissingErrorResponse'
                '500':
                    description: Server error
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Internal server error
        put:
            tags: [Reviews]
            summary: Update a review
            description: |
                Replaces `title`, `body`, and `score` on an existing review. Only the
                original author may edit a review — admins cannot edit other users' reviews.
            security:
                - bearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/UpdateReviewRequest'
            responses:
                '200':
                    description: Review updated
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Review'
                '400':
                    description: Validation failed
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationErrorResponse'
                '401':
                    description: Missing or invalid bearer token
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthenticatedErrorResponse'
                '403':
                    description: Caller is not the review author
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedErrorResponse'
                '404':
                    description: Review not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MissingErrorResponse'
                '500':
                    description: Server error
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Internal server error
        delete:
            tags: [Reviews]
            summary: Delete a review
            description: |
                Deletes a review. The author may delete their own review; users with the
                Admin role may delete any review.
            security:
                - bearerAuth: []
            responses:
                '204':
                    description: Review deleted
                '401':
                    description: Missing or invalid bearer token
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthenticatedErrorResponse'
                '403':
                    description: Caller is neither the author nor an admin
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedErrorResponse'
                '404':
                    description: Review not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MissingErrorResponse'
                '500':
                    description: Server error
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Internal server error
    /users/me:
        get:
            tags: [Users]
            summary: Get the current user
            description: Returns the profile of the authenticated user
            security:
                - bearerAuth: []
            responses:
                '200':
                    description: Current user profile
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/User'
                '401':
                    description: Missing or invalid bearer token
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthenticatedErrorResponse'
                '404':
                    description: User not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MissingErrorResponse'
                '500':
                    description: Server error
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Internal server error
    /users/{id}:
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
              description: User ID
        get:
            tags: [Users]
            summary: Get a user by ID
            security:
                - bearerAuth: []
            responses:
                '200':
                    description: User found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/User'
                '400':
                    description: Invalid user ID
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationErrorResponse'
                '401':
                    description: Missing or invalid bearer token
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthenticatedErrorResponse'
                '404':
                    description: User not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MissingErrorResponse'
                '500':
                    description: Server error
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Internal server error
        put:
            tags: [Users]
            summary: Update a user
            description: |
                Updates `email` and/or `role` on a user. The owner may update their own
                email; only Admin may change a user's role. Unknown fields in the request
                body are silently ignored.
            security:
                - bearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/UpdateUserRequest'
            responses:
                '200':
                    description: User updated
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/User'
                '400':
                    description: Validation failed
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationErrorResponse'
                '401':
                    description: Missing or invalid bearer token
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthenticatedErrorResponse'
                '403':
                    description: Caller is neither the owner nor an admin
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedErrorResponse'
                '404':
                    description: User not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MissingErrorResponse'
                '409':
                    description: Email already in use by another user
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ConflictErrorResponse'
                '500':
                    description: Server error
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Internal server error
        delete:
            tags: [Users]
            summary: Delete a user
            description: |
                Permanently removes the user and all associated reviews (cascade delete).
                The owner may delete their own account; Admin may delete any account.
            security:
                - bearerAuth: []
            responses:
                '204':
                    description: User deleted
                '400':
                    description: Invalid user ID
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationErrorResponse'
                '401':
                    description: Missing or invalid bearer token
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthenticatedErrorResponse'
                '403':
                    description: Caller is neither the owner nor an admin
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedErrorResponse'
                '404':
                    description: User not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MissingErrorResponse'
                '500':
                    description: Server error
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Failed to delete user
    /issues:
        get:
            tags: [Issues]
            summary: List issues
            description: |
                Returns a paginated list of reviews, newest first. Optionally filter by
                `tmdbId` and `mediaType` to fetch all reviews for a specific title.
            security:
                - bearerAuth: []
            responses:
                '200':
                    description: List of reviews
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/IssueListResponse'
                '500':
                    description: Server error
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Internal server error
        post:
            tags: [Issues]
            summary: Create an issue
            description: |
                Creates an issue.
            security:
                - bearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CreateIssueRequest'
            responses:
                '201':
                    description: Review created
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Issue'
                '400':
                    description: Invalid input
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationErrorResponse'
                '401':
                    description: Missing or invalid bearer token
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthenticatedErrorResponse'
                '409':
                    description: User has already reviewed this title
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ConflictErrorResponse'
                '500':
                    description: Server error
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Failed to create review

    /issues/{id}:
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
              description: Issue ID
        get:
            tags: [Issues]
            summary: Get an issue by ID
            responses:
                '200':
                    description: Issue found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Issue'
                '400':
                    description: Invalid issue ID
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationErrorResponse'
                '404':
                    description: Issue not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MissingErrorResponse'
                '500':
                    description: Server error
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Internal server error
        put:
            tags: [Issues]
            summary: Update an issue status
            description: |
                Changes the status of an existing issue. Must be an Admin to update.
            security:
                - bearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/UpdateIssueRequest'
            responses:
                '200':
                    description: Review updated
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Issue'
                '400':
                    description: Validation failed
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationErrorResponse'
                '401':
                    description: Missing or invalid bearer token
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthenticatedErrorResponse'
                '403':
                    description: Caller is not an Admin
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedErrorResponse'
                '404':
                    description: Issue not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MissingErrorResponse'
                '500':
                    description: Server error
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        example: Internal server error

# ── Schemas ───────────────────────────────────────────────────

components:
    securitySchemes:
        bearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT
    schemas:
        MoviesSearchResponse:
            type: object
            properties:
                code:
                    type: integer
                    example: 200
                page:
                    type: integer
                    example: 0
                totalPages:
                    type: integer
                    example: 2
                    minimum: 0
                results:
                    type: array
                    items:
                        type: object
                        minItems: 0
                        maxItems: 20
                        properties:
                            id:
                                type: integer
                                example: 961323
                            lang:
                                type: string
                                example: en
                            title:
                                type: string
                                example: Nimona
                            description:
                                type: string
                                example: A knight framed for a tragic crime teams with a scrappy, shape-shifting teen to prove his innocence.
                            releaseDate:
                                type: string
                                example: 2023-06-23
                            poster:
                                type: string
                                example: https://image.tmdb.org/t/p/w500/2NQljeavtfl22207D1kxLpa4LS3.jpg
        MovieResponse:
            type: object
            properties:
                id:
                    type: integer
                    example: 961323
                title:
                    type: string
                    example: Nimona
                description:
                    type: string
                    example: A knight framed for a tragic crime teams with a scrappy, shape-shifting teen to prove his innocence.
                releaseDate:
                    type: string
                    example: 2023-06-23
                poster:
                    type: string
                    example: https://image.tmdb.org/t/p/w500/2NQljeavtfl22207D1kxLpa4LS3.jpg
                genres:
                    type: array
                    items:
                        type: string
                    example: [Animation, Family, Adventure]
                runtime:
                    type: integer
                    example: 99
                rating:
                    type: number
                    example: 7.9
        ShowsSearchResponse:
            type: object
            properties:
                code:
                    type: integer
                    example: 200
                page:
                    type: integer
